---
- name: Modify Cloud Infra
  hosts: localhost
  gather_facts: false
  vars:
    aws_region: "us-east-2"
    vpc_name: "ansible-demo"
    sg_name: "ansible-demo"
    sg_description: "AWS demo SG for the demo"

  tasks:
    - name: Look up VPC ID using the VPC Name tag
      amazon.aws.ec2_vpc_net_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ vpc_name }}"
      register: vpc_info

    - name: Fail if the VPC was not found
      ansible.builtin.fail:
        msg: "Could not find a VPC named '{{ vpc_name }}' in region {{ aws_region }}"
      when: vpc_info.vpcs | length == 0

    - name: Purge rules before adding, workaround due to policy restrictions
      amazon.aws.ec2_security_group:
        name: "{{ sg_name }}"
        description: "{{ sg_description }}"
        vpc_id: "{{ vpc_info.vpcs[0].vpc_id }}" 
        region: "{{ aws_region }}"
        rules:[]
        purge_rules: true
      register: sg_cleared
        
    - name: Ensure specific TCP ports are open
      amazon.aws.ec2_security_group:
        name: "{{ sg_name }}"
        description: "{{ sg_description }}"
        vpc_id: "{{ vpc_info.vpcs[0].vpc_id }}" 
        region: "{{ aws_region }}"
        rules:
          - proto: tcp
            ports:
              - 80
              - 443
              - 8080
              - 22
            cidr_ip: 0.0.0.0/0
            rule_desc: "Allow application ports"
      register: sg_result
    
    - name: Display Security Group Information
      ansible.builtin.debug:
        msg: "Security Group ID: {{ sg_result.group_id }} has been updated successfully."
