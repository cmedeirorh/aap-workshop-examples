---
- name: Deploy an EC2 VM using Subnet and Security Group Names
  hosts: localhost
  gather_facts: false
  
  vars:
    aws_region: "us-east-2"
    vpc_name: "aws-test-vpc"
    subnet_name: "aws-test-subnet"
    security_group_name: "aws-test-sg"
    ssh_key_name: "aws-test-key"
    ami_id: "ami-04f6cf744b72b140b"
    instance_type: "t3.small"

  tasks:
    - name: Get VPC info
      amazon.aws.ec2_vpc_net_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ vpc_name }}"
      register: vpc_info

    - name: Get Subnet info
      amazon.aws.ec2_vpc_subnet_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ subnet_name }}"
          vpc-id: "{{ vpc_info.vpcs[0].vpc_id }}"
      register: subnet_info

    - name: Get Security Group info
      amazon.aws.ec2_security_group_info:
        region: "{{ aws_region }}"
        filters:
          group-name: "{{ security_group_name }}"
          vpc-id: "{{ vpc_info.vpcs[0].vpc_id }}"
      register: sg_info

    - name: Provision the EC2 instances
      amazon.aws.ec2_instance:
        name: "{{ item }}-{{ owner }}"
        region: "{{ aws_region }}"
        key_name: "{{ ssh_key_name }}"
        vpc_subnet_id: "{{ subnet_info.subnets[0].subnet_id }}"
        security_group: "{{ sg_info.security_groups[0].group_id }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ ami_id }}"
        wait: true
        exact_count: 1
        network:
          assign_public_ip: true
        tags:
          Environment: "Dev"
          ManagedBy: "Ansible"
          owner: "{{ owner }}"
          uuid: "{{ owner }}"
      loop: 
        - node1
        - node2
      register: ec2_results

    - name: Display newly provisioned instance details
      ansible.builtin.debug:
        msg: 
          - "Instance ID: {{ ec2_result.instances[0].instance_id }}"
          - "Private IP: {{ ec2_result.instances[0].private_ip_address }}"
          - "Public IP: {{ ec2_result.instances[0].public_ip_address | default('None assigned') }}"
