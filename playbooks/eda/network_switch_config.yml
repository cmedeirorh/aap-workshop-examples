---
- name: Manage Cisco Switch
  hosts: localhost
  gather_facts: false
  vars:
    targer_interface: "GigabitEthernet0/2"
    #targer_interface: "GigabitEthernet0/{{ interface_index }}"
 
  tasks:
  - name: Debug
    ansible.builtin.debug:
      msg: {{ (test.split(',') | select('search', 'interface_index') | first).split(':')[1] }}"
