---
- name: Convert string into dict
  hosts: localhost
  gather_facts: false
  vars:
    tags_parsed: {}
 
  tasks:
  - name: Build the dictionary by looping through comma-separated items
    set_fact:
      tags_parsed: >-
        {{
          tags_parsed | combine({
            (item.split(':', 1)[0]): (item.split(':', 1)[1] if ':' in item else true)
          })
        }}
    loop: "{{ test.split(',') }}"  
    
  - name: Debug
    ansible.builtin.debug:
      msg: "{{ tags_parsed.host }}"
