---
- name: Manage Cisco Switch
  hosts: localhost
  gather_facts: false
  vars:
    targer_interface: "GigabitEthernet0/2"
    tags_parsed: {}
    #targer_interface: "GigabitEthernet0/{{ interface_index }}"
 
  tasks:
  - name: Build the dictionary by looping through comma-separated items
    set_fact:
      tags_parsed: >-
        {{
          tags_parsed | combine({
            (item.split(':', 1)[0]): (item.split(':', 1)[1] if ':' in item else true)
          })
        }}
    loop: "{{ test.split(',') }}"  
    
  - name: Debug
    ansible.builtin.debug:
      msg: "GigabitEthernet0/{{ tags_parsed.interface_index }}"
      
  - name: Administratively Enable Interfaces on Switch
    cisco.ios.ios_interfaces:
      config:
        - name: "GigabitEthernet0/{{ tags_parsed.interface_index }}"
          enabled: true
      state: merged
