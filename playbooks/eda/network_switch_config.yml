---
- name: Convert string into dict
  hosts: localhost
  gather_facts: false
  vars:
    tags_parsed: {}
 
  tasks:
  - name: Build the dictionary
    ansible.builtin.set_fact:
      tags_parsed: >-
        {{
          tags_parsed | combine({
            (item.split(':', 1)[0]): (item.split(':', 1)[1] if ':' in item else true)
          })
        }}
    loop: "{{ test.split(',') }}"  

  - name: Split the string
    ansible.builtin.set_fact:
      host_list: "{{ tags_parsed.host.split(':') }}"

  - name: Find the host
    ansible.builtin.set_fact:
      _host: "{{ host_list[2] }}"

- name: Manage Switch
  hosts: "{{ hostvars['localhost']['_host'] }}"
  gather_facts: false
  vars:
    interface: "GigabitEthernet0/{{ hostvars['localhost']['tags_parsed.interface_index'] }}"
  
  tasks:
  - name: Enable Interfaces on Switch
    cisco.ios.ios_interfaces:
      config:
        - name: "{{ interface }}"
          enabled: true
      state: merged
