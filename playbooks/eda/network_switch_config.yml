---
- name: Convert string into dict
  hosts: localhost
  gather_facts: false
  vars:
    tags_parsed: {}
 
  tasks:
  - name: Build the dictionary
    set_fact:
      ansible.builtin.tags_parsed: >-
        {{
          tags_parsed | combine({
            (item.split(':', 1)[0]): (item.split(':', 1)[1] if ':' in item else true)
          })
        }}
    loop: "{{ test.split(',') }}"  

  - name: Split the string
    ansible.builtin.set_fact:
      host_list: "{{ tags_parsed.host.split(':') }}"
        
  - name: Debug
    ansible.builtin.debug:
      msg: "{{ host_list[2] }}"
