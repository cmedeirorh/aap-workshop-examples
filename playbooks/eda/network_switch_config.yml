---
- name: Convert string into dict
  hosts: localhost
  gather_facts: false
  vars:
    tags_parsed: {}
 
  tasks:
  - name: Build the dictionary
    ansible.builtin.set_fact:
      tags_parsed: >-
        {{
          tags_parsed | combine({
            (item.split(':', 1)[0]): (item.split(':', 1)[1] if ':' in item else true)
          })
        }}
    loop: "{{ test.split(',') }}"  

  - name: Split the string
    ansible.builtin.set_fact:
      host_list: "{{ tags_parsed.host.split(':') }}"

- name: Manage Switch
  hosts: localhost
  gather_facts: false
 
  tasks:
  - name: Enable Interfaces on Switch
    cisco.ios.ios_interfaces:
    delegate_to: localhost
      config:
        - name: "GigabitEthernet0/{{ tags_parsed.interface_index }}"
          enabled: true
      state: merged
