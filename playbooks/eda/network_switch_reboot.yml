---
- name: Recover from unresponsive device
  hosts: bastion
  vars:
    tags_parsed: {}
 
  tasks:
  - name: Build the dictionary
    ansible.builtin.set_fact:
      tags_parsed: >-
        {{
          tags_parsed | combine({
            (item.split(':', 1)[0]): (item.split(':', 1)[1] if ':' in item else true)
          })
        }}
    loop: "{{ tags.split(',') }}"  

  - name: Identify the Switch/Host
    ansible.builtin.set_fact:
      vm_name: "{{ tags_parsed.device_hostname }}"
  
  - name: Identify Hypervisor
    ansible.builtin.set_fact:
      _hypervisor: "{{ tags_parsed.agent_host }}"

  - name: Check the current status of the VM
    ansible.builtin.shell: "virsh domstate {{ vm_name }}"
    register: vm_status
    changed_when: false
      
  - name: Issue a graceful reboot
    ansible.builtin.shell: "virsh start {{ vm_name }}"
    register: reboot_result
    when: "'shut off' in vm_status.stdout"
