---
- name: Respond to Events
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 35001

  rules:
    - name: ServiceNow Events
      condition: event.payload is defined
      action:
        run_job_template:
          name: "RHEL Sync SSH Keys"
          organization: Default
          job_args:
            labels: 
              - "test"
            extra_vars: 
              data: "{{ event.payload }}"
