---
- name: Respond to ServiceNow Events
  hosts: all
  sources:
    - ansible.eda.webhook:

  rules:
    - name: ServiceNow Change Request set to Scheduled
      condition: event.payload.event_type == "change_request_scheduled"
      action:
        run_job_template:
          name: "EDA - Linux Deploy APP With Podman"
          organization: Default
          job_args:
            extra_vars:
              data: "{{ event.payload }}"

    - name: Print Payload
      condition: event.payload is defined
      action:
        debug:
          var: event.payload
