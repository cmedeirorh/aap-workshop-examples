---
- name: Respond to Datadog Events
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 35001

  rules:
    - name: Datadog Alert - Web Monitoring
      condition: event.payload.alert_title contains "Web App is DOWN" 
      action:
        run_job_template:
          name: "EDA - Linux Deploy APP With Podman"
          organization: Default
          job_args:
            limit: "{{ event.payload.hostname }}"
            
    - name: Datadog Alert - Others
      condition: event.payload.trigger_name is defined
      action:
        run_job_template:
          name: "EDA - Report Incident to ServiceNow"
          organization: Default
          job_args:
            limit: "{{ event.payload.host_host }}"
            extra_vars:
              _hosts: "{{ event.payload.host_host }}"
              _payload: "{{ event.payload }}"
            
    - name: Debug
      condition: event.payload is defined       
      action:
        debug:
          var: event.payload            
